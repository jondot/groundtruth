name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gt-${{ matrix.target }}.tar.gz gt
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gt-${{ matrix.target }}
          path: gt-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # needed for cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (keyless)
        run: |
          # Keyless signing via GitHub OIDC — no static keys to manage.
          # Produces .sig (signature) and .crt (Fulcio-issued certificate)
          # alongside each .tar.gz. Anyone can verify with:
          #   cosign verify-blob \
          #     --certificate-identity-regexp 'https://github.com/jondot/groundtruth/\.github/workflows/release\.yml' \
          #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          #     --certificate <file>.crt \
          #     --signature <file>.sig \
          #     <file>.tar.gz
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "$f"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sig
            artifacts/**/*.crt
          generate_release_notes: true
          body: |
            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/jondot/groundtruth/main/install.sh | sh
            ```

            Or pull the Docker image:

            ```sh
            docker run ghcr.io/jondot/groundtruth:${{ github.ref_name }} --help
            ```

            ## Verify a download

            Release artifacts are signed with [cosign](https://docs.sigstore.dev/cosign/overview) (keyless via GitHub OIDC). No static key to trust — the signature is bound to this workflow run.

            ```sh
            cosign verify-blob \
              --certificate-identity-regexp 'https://github.com/jondot/groundtruth/\.github/workflows/release\.yml' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate gt-<target>.tar.gz.crt \
              --signature gt-<target>.tar.gz.sig \
              gt-<target>.tar.gz
            ```

  docker:
    name: Docker (ghcr.io)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build linux/amd64 only for reliability. To add arm64 later:
      # set up QEMU + buildx with linux/amd64,linux/arm64 platforms.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/jondot/groundtruth:${{ github.ref_name }}
            ghcr.io/jondot/groundtruth:latest
          labels: |
            org.opencontainers.image.source=https://github.com/jondot/groundtruth
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

  publish-npm:
    name: Publish to npm
    needs: [build, release]
    # Opt-in: set repository variable PUBLISH_NPM=true (and the NPM_TOKEN secret)
    # to enable npm publishing. Skipped by default so releases work without npm.
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf artifacts/gt-aarch64-apple-darwin/gt-aarch64-apple-darwin.tar.gz             -C npm/groundtruth-darwin-arm64/
          tar xzf artifacts/gt-x86_64-apple-darwin/gt-x86_64-apple-darwin.tar.gz               -C npm/groundtruth-darwin-x64/
          tar xzf artifacts/gt-x86_64-unknown-linux-gnu/gt-x86_64-unknown-linux-gnu.tar.gz     -C npm/groundtruth-linux-x64/
          tar xzf artifacts/gt-aarch64-unknown-linux-gnu/gt-aarch64-unknown-linux-gnu.tar.gz   -C npm/groundtruth-linux-arm64/
          for pkg in npm/groundtruth npm/groundtruth-darwin-arm64 npm/groundtruth-darwin-x64 npm/groundtruth-linux-x64 npm/groundtruth-linux-arm64; do
            npm --prefix "$pkg" version "$VERSION" --no-git-tag-version --allow-same-version
          done
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('npm/groundtruth/package.json'));
            const v = p.version;
            Object.keys(p.optionalDependencies).forEach(k => p.optionalDependencies[k] = v);
            fs.writeFileSync('npm/groundtruth/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish platform packages
        run: |
          for pkg in npm/groundtruth-darwin-arm64 npm/groundtruth-darwin-x64 npm/groundtruth-linux-x64 npm/groundtruth-linux-arm64; do
            name=$(node -p "require('./$pkg/package.json').name")
            ver=$(node -p "require('./$pkg/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already published — skipping"
            else
              ( cd "$pkg" && npm publish --access public )
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          name=$(node -p "require('./npm/groundtruth/package.json').name")
          ver=$(node -p "require('./npm/groundtruth/package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            ( cd npm/groundtruth && npm publish --access public )
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    # Opt-in: set repository variable PUBLISH_CRATES=true (and the
    # CARGO_REGISTRY_TOKEN secret). Skipped by default. `cargo publish` only
    # succeeds for a version not already on crates.io, so it runs once per tag.
    if: ${{ vars.PUBLISH_CRATES == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          UA="groundtruth-release (https://github.com/jondot/groundtruth)"
          if curl -fsS -A "$UA" "https://crates.io/api/v1/crates/groundtruth/$VERSION" >/dev/null 2>&1; then
            echo "groundtruth $VERSION already on crates.io — skipping"
          else
            cargo publish
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
